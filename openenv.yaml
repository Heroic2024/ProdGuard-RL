name: ProdGuard-RL
version: "1.0"
spec: openenv/v1

environment:
  description: RL environment for DevOps incident response with partial observability
  max_steps: 15
  tasks:
    - easy
    - medium
    - hard

server:
  host: 0.0.0.0
  port: 8000
  entrypoint: python server.py

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

contracts:
  reset_returns: IncidentState
  step_accepts: AgentAction
  step_returns: StepResult
  state_returns: IncidentState
